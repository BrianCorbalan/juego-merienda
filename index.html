<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Juego de Merienda</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div id="app">

    <!-- HEADER -->
    <header class="topbar">
      <div class="brand">
        <span class="brand-dice">🎲</span>
        <span class="brand-text">boLUDO</span>
      </div>
      <div class="turn-chip" id="turnChip">
        <span id="turnChipEmoji">🐯</span>
        <span id="turnChipName">Brian</span>
      </div>
      <button id="endGameBtn" class="btn btn-ghost">Finalizar partida</button>
    </header>

    <!-- MAIN LAYOUT -->
    <main class="layout">

      <!-- BOARD -->
      <section class="board-wrap">
        <div id="board" class="board"></div>
      </section>

      <!-- SIDE PANEL -->
      <aside class="side-panel" id="sidePanel">
        <h2 class="panel-title">Jugadores</h2>
        <div id="playerList" class="player-list"></div>
      </aside>

    </main>
  </div>

  <!-- OVERLAY LAYER -->
  <div id="overlayLayer" class="overlay-layer"></div>

  <!-- ================= TEMPLATES ================= -->

  <template id="tpl-turn-popup">
    <div class="overlay-backdrop fade">
      <div class="turn-popup pop">
        <div class="turn-popup-dice">🎲</div>
        <div class="turn-popup-label">Turno de</div>
        <div class="turn-popup-name" data-role="name"></div>
        <div class="turn-popup-emoji" data-role="emoji"></div>
        <div class="turn-popup-tap">Tocá para comenzar</div>
      </div>
    </div>
  </template>

  <template id="tpl-main-card">
    <div class="overlay-backdrop fade">
      <div class="question-card pop" data-role="card">
        <div class="qc-icon" data-role="icon"></div>
        <div class="qc-category" data-role="category"></div>
        <div class="qc-stars" data-role="stars"></div>
        <div class="qc-question" data-role="question"></div>
        <div class="qc-actions">
          <button class="btn btn-primary" data-action="confirm">✅ Respondió — Dar estrella</button>
        </div>
      </div>
    </div>
  </template>

  <template id="tpl-bonus-card">
    <div class="overlay-backdrop fade">
      <div class="question-card bonus pop" data-role="card">
        <div class="qc-icon">🎁</div>
        <div class="qc-category">BONUS · Cultura General</div>
        <div class="qc-question" data-role="question"></div>

        <div class="qc-actions" data-role="reveal-actions">
          <button class="btn btn-primary" data-action="reveal">👁️ Ver respuesta</button>
        </div>

        <div class="bonus-answer-wrap" data-role="answer-wrap">
          <div class="bonus-answer-label">Respuesta</div>
          <div class="bonus-answer-text" data-role="answer"></div>
        </div>

        <div class="qc-actions two bonus-result-actions" data-role="result-actions">
          <button class="btn btn-correct" data-action="correct">✅ Correcto</button>
          <button class="btn btn-incorrect" data-action="incorrect">❌ Incorrecto</button>
        </div>
      </div>
    </div>
  </template>

  <template id="tpl-five-popup">
    <div class="overlay-backdrop fade">
      <div class="five-popup pop">
        <div class="five-popup-dice">🎲</div>
        <div class="five-popup-title">¡Salió 5!</div>
        <div class="five-popup-sub">Volvés a tirar</div>
        <div class="five-popup-total" data-role="total"></div>
        <button class="btn btn-primary" data-action="reroll">🎲 Tirar de nuevo</button>
      </div>
    </div>
  </template>

  <template id="tpl-special-popup">
    <div class="overlay-backdrop fade">
      <div class="lap-card pop">
        <div class="lap-title">
          <span data-role="icon"></span>
          <span data-role="title"></span>
        </div>
        <div class="lap-subtitle">Elegí una opción</div>

        <div class="special-section-label">⭐ Reclamar una estrella</div>
        <div class="lap-options" data-role="star-options"></div>

        <button class="btn btn-primary special-reroll-btn" data-action="reroll">🎲 Volver a tirar</button>
      </div>
    </div>
  </template>

  <template id="tpl-star-burst">
    <div class="overlay-backdrop fade transparent">
      <div class="star-burst pop">
        <div class="star-burst-emoji">⭐</div>
        <div class="star-burst-text">¡Estrella conseguida!</div>
      </div>
    </div>
  </template>

  <template id="tpl-category-complete">
    <div class="overlay-backdrop fade transparent">
      <div class="cat-complete pop">
        <div class="cat-complete-emoji" data-role="icon"></div>
        <div class="cat-complete-text">¡Categoría completa!</div>
      </div>
    </div>
  </template>

  <template id="tpl-final">
    <div class="overlay-backdrop fade solid">
      <div class="final-screen">
        <div class="final-title" data-role="title">🎉 ¡Partida terminada! 🎉</div>
        <div class="final-sub">Revelando monedas…</div>
        <div class="ranking-list" data-role="ranking"></div>
        <button class="btn btn-primary" data-action="close">Cerrar</button>
      </div>
    </div>
  </template>

  <template id="tpl-prize-popup">
    <div class="overlay-backdrop fade">
      <div class="prize-popup pop">
        <div class="prize-title">🎁 ¡Elegí tu premio!</div>

        <div class="prize-options" data-role="prize-options">
          <button class="prize-option prize-green" data-prize="music">
            <span class="prize-option-label">Día para pasar<br> música sin restricciones</span>
          </button>
          <button class="prize-option prize-red" data-prize="alfajor">
            <span class="prize-option-label">Un alfajor<br>a elección</span>
          </button>
          <button class="prize-option prize-pink" data-prize="box">
            <span class="prize-qmarks" aria-hidden="true">
              <span>?</span><span>?</span><span>?</span><span>?</span>
              <span>?</span><span>?</span><span>?</span><span>?</span>
              <span>?</span><span>?</span><span>?</span><span>?</span>
            </span>
            <span class="prize-option-label">O lo que hay<br>dentro de esta caja</span>
          </button>
        </div>

        <div class="prize-reveal" data-role="prize-reveal">
          <div class="prize-reveal-message" data-role="prize-reveal-message"></div>
          <div class="prize-reveal-video" data-role="prize-reveal-video"></div>
          <button class="btn btn-primary prize-close-btn" data-action="prize-close">Cerrar</button>
        </div>
      </div>
    </div>
  </template>

  <script src="js/data-categories.js"></script>
  <script src="js/data-players.js"></script>
  <script src="js/data-questions.js"></script>
  <script src="js/data-bonus.js"></script>
  <script src="js/board.js"></script>
  <script src="js/state.js"></script>
  <script src="js/dice.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/cards.js"></script>
  <script src="js/game.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
